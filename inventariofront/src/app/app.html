<div *ngIf="!sesionIniciada" class="login-container">
  <div class="login-card">
    <h2 class="login-title">Sistema de Inventario</h2>
    <p class="login-subtitle">Inicia sesión para continuar</p>

    <form (submit)="onLoginLocal($event)">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" [(ngModel)]="credentials.email" required placeholder="admin@correo.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" [(ngModel)]="credentials.password" required placeholder="******">
      </div>

      <div *ngIf="errorMessage" class="error-msg">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-login">Ingresar</button>
    </form>
  </div>
</div>

<div *ngIf="sesionIniciada" class="d-flex" style="min-height: 100vh;">

  <aside class="bg-dark text-white p-3" style="width: 250px; display: flex; flex-direction: column; justify-content: space-between;">
    <div>
      <h4 class="mb-4">Inventario</h4>
      <div class="d-grid gap-2">
        <button class="btn btn-outline-light text-start" (click)="cambiarPestana('bienvenida')"> Inicio</button>
        <button class="btn btn-outline-light text-start" (click)="cambiarPestana('empleados')">Empleados</button>
        <button class="btn btn-outline-light text-start" (click)="cambiarPestana('proveedores')"> Proveedores</button>
        <button class="btn btn-outline-light text-start" (click)="cambiarPestana('activos')">Activos</button>
        <button class="btn btn-outline-light text-start" (click)="cambiarPestana('facturas')"> Facturas</button>
        <button class="btn btn-outline-light text-start" (click)="cambiarPestana('asignaciones')">Asignaciones</button>
      </div>
    </div>

    <button class="btn btn-danger text-start mt-auto" (click)="onLogout()">
      ✕ Cerrar Sesión
    </button>
  </aside>

  <main class="flex-grow-1 bg-light">
    <div class="bg-white shadow-sm p-3 mb-3 d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Panel de Administración</h4>
      <span class="text-muted">Sesión Activa</span>
    </div>

    <div class="p-3">
      <div *ngIf="pestanaActiva() === 'bienvenida'" class="text-center mt-5">
        <h2>¡Bienvenido!</h2>
        <p class="text-muted">Selecciona una opción del menú de la izquierda para comenzar a gestionar.</p>
      </div>

      <app-empleados *ngIf="pestanaActiva() === 'empleados'"></app-empleados>
      <app-proveedores *ngIf="pestanaActiva() === 'proveedores'"></app-proveedores>
      <app-activos *ngIf="pestanaActiva() === 'activos'"></app-activos>
      <app-facturas *ngIf="pestanaActiva() === 'facturas'"></app-facturas>
      <app-asignaciones *ngIf="pestanaActiva() === 'asignaciones'"></app-asignaciones>
    </div>
  </main>

</div>
