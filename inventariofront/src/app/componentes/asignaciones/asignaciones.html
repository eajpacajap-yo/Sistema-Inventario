<div class="container mt-4">
  <h2 class="mb-4">Control de Asignaciones</h2>
  
  <div class="card p-4 mb-4 shadow-sm border-0 bg-white">
    <div class="row g-3">
      <div class="col-md-5">
        <label class="form-label fw-bold">Empleado Responsable</label>
        <select [(ngModel)]="nuevoAsignacion.empleado.id" class="form-select">
          <option [ngValue]="null">Seleccione empleado...</option>
          <option *ngFor="let e of empleados" [value]="e.id">{{ e.nombre }}</option>
        </select>
      </div>

      <div class="col-md-5">
        <label class="form-label fw-bold">Activo a Entregar</label>
        <select [(ngModel)]="nuevoAsignacion.activo.id" class="form-select">
          <option [ngValue]="null">Seleccione equipo...</option>
          <option *ngFor="let a of activosDisponibles" [value]="a.id">
            {{ a.nombre }} ({{ a.codigoSku }})
          </option>
        </select>
      </div>

      <div class="col-md-5">
        <label class="form-label fw-bold">Fecha Asignación</label>
        <input type="date" [(ngModel)]="nuevoAsignacion.fechaAsignacion" class="form-control">
      </div>

      <div class="col-md-8">
        <label class="form-label fw-bold">Observaciones / Detalles</label>
        <input [(ngModel)]="nuevoAsignacion.observaciones" class="form-control" placeholder="Ej: Se entrega con cargador y bolso">
      </div>

      <div class="col-md-4 d-grid align-items-end">
        <button (click)="guardar()" class="btn btn-primary">
          {{ editandoId ? 'Actualizar Asignación' : 'Vincular Activo' }}
        </button>
      </div>
    </div>
  </div>

  <input type="text" [(ngModel)]="textoBusqueda" placeholder=" Buscar por empleado o equipo..." class="form-control mb-3 shadow-sm">

  <table class="table table-hover shadow-sm bg-white">
    <thead class="table-dark">
      <tr>
        <th>Fecha</th>
        <th>Empleado</th>
        <th>Activo / SKU</th>
        <th>Observaciones</th>
        <th class="text-center">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let a of filtrar()">
        <td>{{ a.fechaAsignacion }}</td>
        <td><strong>{{ a.empleado?.nombre }}</strong></td>
        <td>{{ a.activo?.nombre }} <br><small class="text-muted">{{ a.activo?.codigoSku }}</small></td>
        <td>{{ a.observaciones }}</td>
        <td class="text-center">
          <button (click)="prepararEdicion(a)" class="btn btn-sm btn-outline-info me-1">Editar</button>
          <button (click)="eliminar(a.id)" class="btn btn-sm btn-outline-danger">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
