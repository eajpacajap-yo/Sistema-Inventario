<div class="container mt-4">
  <h2 class="mb-4">Registro de Facturas</h2>

  <div class="card p-4 mb-4 shadow-sm border-info">
    <div class="row g-3">
      <div class="col-md-5">
        <label class="form-label fw-bold">Número de Factura</label>
        <input [(ngModel)]="nuevoFactura.numeroFactura" class="form-control" placeholder="Ej: FAC-999">
      </div>
      
      <div class="col-md-5">
        <label class="form-label fw-bold">Fecha</label>
        <input type="date" [(ngModel)]="nuevoFactura.fecha" class="form-control">
      </div>

      <div class="col-md-5">
        <label class="form-label fw-bold">Proveedor</label>
        <select [(ngModel)]="nuevoFactura.proveedor.id" class="form-select">
          <option [ngValue]="null" disabled>Seleccione un proveedor...</option>
          <option *ngFor="let p of proveedores" [value]="p.id">
            {{ p.nombre }} ({{ p.nit }})
          </option>
        </select>
      </div>

      <div class="col-md-2 d-grid align-items-end">
        <button (click)="guardar()" class="btn" [ngClass]="editandoId ? 'btn-warning' : 'btn-info text-white'">
          {{ editandoId ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>
    </div>
  </div>

  <input type="text" [(ngModel)]="textoBusqueda" placeholder="Buscar por número o proveedor..." class="form-control mb-3">

  <div class="table-responsive">
    <table class="table table-hover align-middle shadow-sm">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Número</th>
          <th>Fecha</th>
          <th>Proveedor</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let f of filtrarFacturas()">
          <td>{{ f.id }}</td>
          <td><strong>{{ f.numeroFactura }}</strong></td>
          <td>{{ f.fecha }}</td>
          <td>
            <span class="badge bg-secondary">{{ f.proveedor?.nombre || 'Sin proveedor' }}</span>
          </td>
          <td class="text-center">
            <button (click)="prepararEdicion(f)" class="btn btn-sm btn-outline-primary me-1">Editar</button>
            <button (click)="eliminar(f.id)" class="btn btn-sm btn-outline-danger">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
