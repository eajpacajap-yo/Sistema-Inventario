<div class="container mt-4">

  <h2 class="mb-4">Gestión de Empleados</h2>

  <form (ngSubmit)="guardar()">

    <div class="card p-4 mb-4 shadow-sm border-primary">

      <div class="row g-3 align-items-end">

        <!-- NOMBRE -->
        <div class="col-md-5">
          <label class="form-label fw-bold">Nombre completo</label>

          <input
            type="text"
            [(ngModel)]="nuevoEmpleado.nombre"
            name="nombre"
            class="form-control"
            placeholder="Ej: Juan Pérez">
        </div>

        <!-- DEPARTAMENTO -->
        <div class="col-md-5">
          <label class="form-label fw-bold">Departamento</label>

          <input
            type="text"
            [(ngModel)]="nuevoEmpleado.departamento"
            name="departamento"
            class="form-control"
            placeholder="Ej: Sistemas">
        </div>

        <!-- CORREO -->
        <div class="col-md-5">
          <label class="form-label fw-bold">Correo</label>

          <input
            type="email"
            [(ngModel)]="nuevoEmpleado.correo"
            name="correo"
            class="form-control"
            placeholder="Ej: correo@gmail.com">
        </div>

        <!-- BOTÓN -->
        <div class="col-md-2 d-grid">

          <button
            type="submit"
            class="btn"
            [ngClass]="editandoId ? 'btn-warning' : 'btn-success'">
             
            {{ editandoId ? 'Actualizar' : 'Registrar' }}
             
          </button>

        </div>

      </div>

      <!-- CANCELAR EDICIÓN -->
      <div class="mt-3 text-end">

        <button
          *ngIf="editandoId"
          type="button"
          (click)="limpiarYRefrescar()"
          class="btn btn-outline-secondary btn-sm">

          Cancelar edición

        </button>

      </div>

    </div>

  </form>

  <!-- BUSCADOR -->
  <div class="input-group mb-3">

    <input
      type="text"
      [(ngModel)]="textoBusqueda"
      placeholder="Buscar empleado..."
      class="form-control">

  </div>

  <!-- TABLA -->
  <div class="table-responsive shadow-sm">

    <table class="table table-hover align-middle bg-white">

      <thead class="table-dark">

        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Departamento</th>
          <th>Correo</th>
          <th class="text-center">Acciones</th>
        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let e of filtrarEmpleados()">

          <td>{{ e.id }}</td>

          <td class="fw-semibold">
            {{ e.nombre }}
          </td>

          <td>
            <span class="badge bg-primary">
              {{ e.departamento }}
            </span>
          </td>

          <td>
            <span class="badge bg-info text-dark">
              {{ e.correo }}
            </span>
          </td>

          <td class="text-center">

            <!-- EDITAR -->
            <button
              type="button"
              (click)="prepararEdicion(e)"
              class="btn btn-sm btn-outline-primary me-1">

              Editar

            </button>

            <!-- ELIMINAR -->
            <button
              type="button"
              (click)="eliminar(e.id)"
              class="btn btn-sm btn-outline-danger">

              Eliminar

            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
